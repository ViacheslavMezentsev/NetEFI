name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # v0.5.0, v1.0.0, etc.

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: сборка фреймворка (параллельно x86 и x64)
  # ─────────────────────────────────────────────────────────────
  build-framework:
    name: Build Framework (${{ matrix.platform }})
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86]

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: nuget/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Extract version
        id: ver
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: nuget restore src/NetEFI.sln

      - name: Build
        run: >
          msbuild src/NetEFI.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:Version=${{ steps.ver.outputs.value }}
          /m /v:minimal

      - name: Upload NetEFI.dll
        uses: actions/upload-artifact@v4
        with:
          name: netefi-host-${{ matrix.platform }}
          path: src/NetEFI/${{ matrix.platform }}/Release/NetEFI.dll
          if-no-files-found: error

      - name: Upload NetEFI.Abstractions.dll
        if: matrix.platform == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: netefi-abstractions
          path: src/NetEFI.Abstractions/bin/Release/net48/NetEFI.Abstractions.dll
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Job 2: сборка примеров + упаковка ZIP (параллельно x86/x64)
  # ─────────────────────────────────────────────────────────────
  build-samples:
    name: Build Samples (${{ matrix.platform }})
    runs-on: windows-latest
    needs: build-framework
    strategy:
      matrix:
        platform: [x64, x86]

    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: nuget/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Extract version
        id: ver
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download NetEFI.dll
        uses: actions/download-artifact@v4
        with:
          name: netefi-host-${{ matrix.platform }}
          path: _host/${{ matrix.platform }}

      - name: Download NetEFI.Abstractions.dll
        uses: actions/download-artifact@v4
        with:
          name: netefi-abstractions
          path: _host/abstractions

      - name: Restore
        run: nuget restore samples/samples.sln

      - name: Build
        run: >
          msbuild samples/samples.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /m /v:minimal

      - name: Package archives
        shell: pwsh
        run: |
          $plat   = "${{ matrix.platform }}"
          $ver    = "${{ steps.ver.outputs.value }}"
          $netefi = "_host/$plat/NetEFI.dll"
          $abs    = "_host/abstractions/NetEFI.Abstractions.dll"
          $inst   = "samples/INSTALL.txt"
          $ws     = "samples/worksheets"

          # Документы Mathcad, общие для всех архивов
          $sheetsCommon = @(
            "$ws/netefi-mp6.mcdx",
            "$ws/netefi-mp11.mcdx",
            "$ws/netefi-mc15.xmcd"
          )

          function New-Archive {
            param($lang, [string[]]$dlls, [string[]]$sheets)
            $dir  = "_zip/$lang"
            $wdir = "$dir/worksheets"
            New-Item -ItemType Directory -Force $dir  | Out-Null
            New-Item -ItemType Directory -Force $wdir | Out-Null
            Copy-Item $netefi $dir
            Copy-Item $abs    $dir
            Copy-Item $inst   $dir
            foreach ($f in $dlls) {
              if (Test-Path $f) { Copy-Item $f $dir }
              else { Write-Warning "Not found: $f" }
            }
            foreach ($f in $sheets) {
              if (Test-Path $f) { Copy-Item $f $wdir }
              else { Write-Warning "Not found: $f" }
            }
            $zip = "netefi-$ver-samples-$lang-$plat.zip"
            Compress-Archive -Path "$dir\*" -DestinationPath $zip -Force
            Write-Host "Created: $zip"
          }

          # C++/CLI — только netefi-документы
          New-Archive 'cppcli' `
            @("samples/cppcli/cpptest/$plat/Release/cpptest.dll") `
            $sheetsCommon

          # C# — netefi-документы + документы cstools
          New-Archive 'csharp' `
            @("samples/csharp/cstest/bin/Release/cstest.dll",
              "samples/csharp/cstools/bin/Release/cstools.dll") `
            ($sheetsCommon + @(
              "$ws/csharp-cstools-mp6.mcdx",
              "$ws/csharp-cstools-mp11.mcdx",
              "$ws/csharp-cstools-mc15.xmcd"
            ))

          # F# — только netefi-документы (нет специфичных)
          New-Archive 'fsharp' `
            @("samples/fsharp/fstest/bin/$plat/Release/net48/fstest.dll",
              "samples/fsharp/fstest/bin/$plat/Release/net48/FSharp.Core.dll") `
            $sheetsCommon

          # VB.NET — netefi-документы + документы capture
          New-Archive 'vbnet' `
            @("samples/vbnet/vbtest/bin/Release/vbtest.dll",
              "samples/vbnet/capture/bin/Release/capture.dll") `
            ($sheetsCommon + @(
              "$ws/vbnet-capture-mp6.mcdx",
              "$ws/vbnet-capture-mc15.xmcd"
            ))

      - name: Upload ZIP archives
        uses: actions/upload-artifact@v4
        with:
          name: zips-${{ matrix.platform }}
          path: netefi-*.zip
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Job 3: упаковка и публикация NuGet
  # ─────────────────────────────────────────────────────────────
  pack-and-publish:
    name: Pack & Publish NuGet
    runs-on: windows-latest
    needs: build-framework

    steps:
      - uses: actions/checkout@v4
      - uses: nuget/setup-nuget@v2
        with:
          nuget-version: 'latest'

      - name: Extract version
        id: ver
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download NetEFI.dll (x64)
        uses: actions/download-artifact@v4
        with:
          name: netefi-host-x64
          path: src/NetEFI/x64/Release

      - name: Download NetEFI.dll (x86)
        uses: actions/download-artifact@v4
        with:
          name: netefi-host-x86
          path: src/NetEFI/x86/Release

      - name: Download NetEFI.Abstractions.dll
        uses: actions/download-artifact@v4
        with:
          name: netefi-abstractions
          path: src/NetEFI.Abstractions/bin/Release/net48

      - name: Pack
        run: >
          nuget pack build/NetEFI.Framework.nuspec
          -Version ${{ steps.ver.outputs.value }}
          -OutputDirectory _nupkg
          -NonInteractive

#      - name: Publish
#        run: >
#          nuget push _nupkg/*.nupkg
#          -ApiKey ${{ secrets.NUGET_API_KEY }}
#          -Source https://api.nuget.org/v3/index.json
#          -SkipDuplicate
#          -NonInteractive

      - name: Upload .nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: _nupkg/*.nupkg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Job 4: создание GitHub Release
  # ─────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-samples, pack-and-publish]

    steps:
      - name: Extract version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download ZIP archives (x64)
        uses: actions/download-artifact@v4
        with:
          name: zips-x64
          path: release/

      - name: Download ZIP archives (x86)
        uses: actions/download-artifact@v4
        with:
          name: zips-x86
          path: release/

      - name: Download .nupkg
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NetEFI Framework v${{ steps.ver.outputs.value }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release/*
          body: |
            ## Install via NuGet
            ```powershell
            Install-Package NetEFI.Framework -Version ${{ steps.ver.outputs.value }}
            ```

            ## Ready-to-use Samples

            > ⚠️ **Before extracting:** right-click the `.zip` file → **Properties** → check **Unblock** → OK.
            > Without this step Windows will block the DLLs from loading.

            Download the archive for your language and Mathcad bitness,
            extract **all files** into the Custom Functions folder.
            Each archive includes a `worksheets/` folder with ready-made Mathcad documents.

            | Language | 64-bit (Mathcad Prime)  | 32-bit (Mathcad 15)     |
            |----------|-------------------------|-------------------------|
            | C#       | samples-csharp-x64.zip  | samples-csharp-x86.zip  |
            | VB.NET   | samples-vbnet-x64.zip   | samples-vbnet-x86.zip   |
            | F#       | samples-fsharp-x64.zip  | samples-fsharp-x86.zip  |
            | C++/CLI  | samples-cppcli-x64.zip  | samples-cppcli-x86.zip  |

            **Installation path:**
            - Mathcad 15 (x86): `C:\Program Files (x86)\Mathcad\Mathcad 15\userefi\`
            - Mathcad Prime (x64): `C:\Program Files\PTC\Mathcad Prime X.X.X.X\Custom Functions\`

            **Verify:** open a file from the `worksheets/` folder, or call `netefi("info")` in any worksheet.

            **Log:** `%AppData%\Mathsoft\Mathcad\NetEFI.log`
